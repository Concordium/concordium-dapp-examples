name: "TypeScript: build and test"

on:
  push:
    branches: main

  pull_request:

env:
  NODE_VERSION: "lts/*"

jobs:
  changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - id: detect
      run: |
        PACKAGES=(
          "dapp-template/frontend"
          "euroe-demo"
          "gallery"
          "low-code-nft-marketplace"
          "signMessage"
          "simpleAgeVerification"
          "sponsoredTransactions/frontend"
          "sponsoredTransactionsAuction/frontend"
          "trackAndTrace/frontend"
          "testnet-faucet"
          "compliant-reward-distribution/frontend"
          "nft-minting"
          "piggybank"
          "eSealing"
          "voting"
          "wCCD"
        )
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          BASE=${{ github.event.pull_request.base.sha }}
        else
          BASE=${{ github.event.before }}
        fi
        CHANGED=$(git diff --name-only "$BASE"...HEAD)
        RESULT=()
        for pkg in "${PACKAGES[@]}"; do
          if echo "$CHANGED" | grep -q "^${pkg}/"; then
            RESULT+=("\"$pkg\"")
          fi
        done
        echo "packages=[$(IFS=,; echo "${RESULT[*]}")]" >> $GITHUB_OUTPUT
  lint:
    name: Running linter
    runs-on: ubuntu-latest
    needs: changes
    if : ${{ needs.changes.outputs.packages != '[]' && needs.changes.outputs.packages != '' }}
    strategy:
      matrix:
        packages: ${{ fromJson(needs.changes.outputs.packages) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run install
        working-directory: ${{ matrix.packages }}
        run: yarn install

      - name: Run Lint
        working-directory: ${{ matrix.packages }}
        run: yarn lint

  prettier:
    name: Running Prettier
    needs: lint
    runs-on: ubuntu-latest
    if : ${{ needs.changes.outputs.packages != '[]' && needs.changes.outputs.packages != '' }}
    strategy:
      matrix:
        packages: ${{ fromJson(needs.changes.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: ${{ matrix.packages }}/yarn.lock

      - name: Run install
        working-directory: ${{ matrix.packages }}
        run: yarn install

      - name: Run Prettier
        working-directory: ${{ matrix.packages }}
        run: yarn prettier -c .

  build:
    name: Building Frontend
    needs: prettier
    runs-on: ubuntu-latest
    if : ${{ needs.changes.outputs.packages != '[]' && needs.changes.outputs.packages != '' }}
    strategy:
      matrix:
        packages: ${{ fromJson(needs.changes.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: ${{ matrix.packages }}/yarn.lock

      - name: Install Low Code NFT Marketplace Dependencies
        if: ${{ matrix.packages == 'low-code-nft-marketplace' }}
        working-directory: low-code-nft-marketplace
        run: yarn install && yarn workspace common-ui build && yarn workspace market-ui build && yarn workspace mint-ui build

      - name: Run install
        if: ${{ matrix.packages != 'low-code-nft-marketplace' }}
        working-directory: ${{ matrix.packages }}
        run: yarn install

      - name: Build
        if: ${{ matrix.packages != 'low-code-nft-marketplace' }}
        working-directory: ${{ matrix.packages }}
        run: yarn build
